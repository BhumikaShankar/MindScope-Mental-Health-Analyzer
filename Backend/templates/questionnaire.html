{% extends 'base.html' %}
{% block content %}

<!-- Inline CSS copied from your reference for exact look & feel -->
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fdfbfb, #ebedee);
    margin: 0; padding: 0;
  }
  .container {
    max-width: 600px;
    margin: 5rem auto;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    padding: 2rem;
    animation: fadeIn 1s ease;
  }
  #motivation {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: #7EC8E3;
    font-weight: 600;
    text-align: center;
  }
  .progress-bar-container {
    width: 100%; height: 10px;
    background: #f0f0f0;
    border-radius: 50px;
    margin-bottom: 1rem;
  }
  #progressBar {
    height: 100%;
    background: linear-gradient(to right, #7EC8E3, #A8E6CF);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 50px;
  }
  #progressText {
    text-align: center;
    font-weight: 500;
    font-size: 0.95rem;
    color: #555;
    margin-bottom: 1rem;
  }
  h2 {
    font-size: 1.5rem;
    color: #333;
    margin-bottom: 1.2rem;
    text-align: center;
  }
  .options-group {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  label {
    background: #f9f9f9;
    padding: 1rem;
    border-radius: 12px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.2s ease;
    font-weight: 500;
  }
  label:hover {
    background: #e6f7f4;
    border-color: #7EC8E3;
    transform: scale(1.01);
  }
  input[type="radio"] {
    margin-right: 10px;
  }
  .buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 2rem;
  }
  .btn {
    padding: 0.8rem 1.5rem;
    border-radius: 30px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    transition: 0.3s;
  }
  .btn-primary {
    background: #7EC8E3;
    color: white;
  }
  .btn-primary:hover {
    background: #6ab5d2;
  }
  .btn-secondary {
    background: #ccc;
    color: #333;
  }
  .btn-secondary:hover {
    background: #bbb;
  }
  .congrats {
    display: none;
    text-align: center;
    padding: 4rem 2rem;
    animation: fadeIn 1s ease;
  }
  .congrats h1 {
    font-size: 2.5rem;
    color: #333;
  }
  .congrats p {
    font-size: 1.2rem;
    color: #555;
    margin-top: 1rem;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    .container { margin: 2rem 1rem; padding: 1.5rem; }
    .buttons { flex-direction: column; gap: 1rem; }
  }
</style>

<div class="container" id="questionnaire">
  <div id="motivation">You're doing great! 🌟</div>
  <div id="progressText">0% Completed</div>
  <div class="progress-bar-container">
    <div id="progressBar"></div>
  </div>

  <h2 id="questionText">Loading question...</h2>
  <div class="options-group" id="optionsGroup"></div>

  <div class="buttons">
    <button class="btn btn-secondary" id="prevBtn" disabled>⬅️ Back</button>
    <button class="btn btn-primary" id="nextBtn">Next ➡️</button>
  </div>
</div>

<div class="congrats" id="congratsScreen">
  <h1>🎉 You did it!</h1>
  <p>Thanks for completing the questionnaire!</p>
  <p>Redirecting you to your personal chat now…</p>
</div>

<form id="quizForm" method="post" action="{{ url_for('questionnaire') }}">
  {% for q in questions %}
    <input type="hidden" name="{{ q.id }}" id="{{ q.id }}">
  {% endfor %}
</form>

<script>
  // Load dynamic data from Flask
  const questions   = {{ questions|map(attribute='text')|list|tojson }};
  const qids        = {{ questions|map(attribute='id')  |list|tojson }};
  const options     = {{ options|tojson }};  // array of [label, value]
  const motivations = [
    "You're doing great! 🌟","Keep going! 💪","Almost there! 🚀","Nice progress! 🎯",
    "Stay strong! 💫","One more step! 🔥","You're awesome! 💛","Feel the growth! 🌿"
  ];

  let current = 0;
  const motivationEl = document.getElementById('motivation');
  const progressBar  = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  const questionText = document.getElementById('questionText');
  const optionsGroup = document.getElementById('optionsGroup');
  const prevBtn      = document.getElementById('prevBtn');
  const nextBtn      = document.getElementById('nextBtn');
  const quizEl       = document.getElementById('questionnaire');
  const congratsEl   = document.getElementById('congratsScreen');
  const form         = document.getElementById('quizForm');

  function updateProgress(idx) {
    const pct = Math.round((idx / questions.length) * 100);
    progressBar.style.width  = pct + '%';
    progressText.textContent = pct + '% Completed';
  }

  function loadQuestion(idx) {
    motivationEl.textContent = motivations[idx % motivations.length];
    questionText.textContent  = questions[idx];
    optionsGroup.innerHTML    = options.map(([label,val]) =>
      `<label><input type="radio" name="choice" value="${val}"> ${label}</label>`
    ).join('');
    prevBtn.disabled = (idx === 0);
    nextBtn.textContent = (idx === questions.length - 1)
      ? 'Finish 🎉'
      : 'Next ➡️';
    updateProgress(idx);
  }

  nextBtn.addEventListener('click', () => {
    const sel = document.querySelector('input[name="choice"]:checked');
    if (!sel) return alert('Please select an option.');
    document.getElementById(qids[current]).value = sel.value;
    if (current < questions.length - 1) {
      current++;
      loadQuestion(current);
    } else {
      quizEl.style.display     = 'none';
      congratsEl.style.display = 'block';
      setTimeout(() => form.submit(), 1500);
    }
  });

  prevBtn.addEventListener('click', () => {
    if (current > 0) {
      current--;
      loadQuestion(current);
    }
  });

  // Initialize
  loadQuestion(0);
</script>

{% endblock %}
