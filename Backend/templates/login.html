{% extends 'base.html' %}
{% block content %}

<div class="auth-body">
  <div class="auth-container">
    <h2>Welcome Back 👋</h2>
    <p class="auth-subtitle">Log in to continue your journey</p>

    <form id="loginForm" method="post" class="auth-form">
      <input name="email"    type="email"    placeholder="Email Address" required />
      <input name="password" type="password" placeholder="Password"      required />
      <button type="submit" class="btn-primary">Login</button>
    </form>

    <!-- spinner + message (styled via your styles.css) -->
    <div id="spinner" class="spinner"></div>
    <p id="message" class="success-text"></p>

    <p class="auth-link">
      Don't have an account?
      <a href="{{ url_for('register') }}">Create one</a>
    </p>
  </div>
</div>

<script>
  const form    = document.getElementById('loginForm');
  const spinner = document.getElementById('spinner');
  const message = document.getElementById('message');

  form.addEventListener('submit', e => {
    e.preventDefault();
    const email    = form.email.value.trim();
    const password = form.password.value.trim();
    const emailRx  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailRx.test(email)) {
      message.style.display = 'block';
      message.style.color   = 'red';
      message.textContent   = '❌ Please enter a valid email address.';
    } else if (password.length < 6) {
      message.style.display = 'block';
      message.style.color   = 'red';
      message.textContent   = '❌ Password must be at least 6 characters.';
    } else {
      message.style.display = 'none';
      spinner.style.display = 'block';
      setTimeout(() => form.submit(), 800);
    }
  });
</script>

{% endblock %}
