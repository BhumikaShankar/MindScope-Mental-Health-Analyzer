<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | MindScope</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* Add spinner CSS */
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #7EC8E3;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 1rem auto;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-text {
      color: green;
      font-size: 1rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body class="auth-body">
  <div class="auth-container">
    <h2>Welcome Back 👋</h2>
    <p class="auth-subtitle">Log in to continue your journey</p>

    <form id="loginForm" class="auth-form">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn-primary">Login</button>
    </form>

    <div id="spinner" class="spinner"></div>
    <p id="message" class="success-text"></p>

    <p class="auth-link">Don't have an account? <a href="signup.html">Create one</a></p>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');
    const spinner = document.getElementById('spinner');

    loginForm.addEventListener('submit', function(event) {
      event.preventDefault(); // Prevent reload

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const isValidEmail = emailPattern.test(email);
      const isValidPassword = password.length >= 6;

      if (!isValidEmail) {
        message.style.display = "block";
        message.style.color = "red";
        message.textContent = "❌ Please enter a valid email address.";
      } else if (!isValidPassword) {
        message.style.display = "block";
        message.style.color = "red";
        message.textContent = "❌ Password must be at least 6 characters.";
      } else {
        // Valid credentials: Show spinner
        spinner.style.display = "block";
        message.style.display = "none";

        setTimeout(() => {
          spinner.style.display = "none";
          message.style.display = "block";
          message.style.color = "green";
          message.textContent = "🎉 Login successful! Redirecting...";

          // Redirect after another short delay
          setTimeout(() => {
            window.location.href = "dashboard.html"; // or dashboard.html
          }, 1500);
        }, 1500);
      }
    });
  </script>
</body>
</html>
